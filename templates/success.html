{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Submitted - {{ company_name }}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0F2A23;
            --bg-card: #1C3A33;
            --accent-gold: #D4AF37;
            --accent-ember: #F2D16B;
            --accent-shadow: #A67C00;
            --text-light: #f5f5f5;
            --line: rgba(28, 58, 51, 0.95);
        }
        body {
            background:
                radial-gradient(circle at 12% 16%, rgba(28, 58, 51, 0.55), transparent 42%),
                linear-gradient(180deg, #0A1F1A, #0F2A23 50%, #0A1F1A 100%);
            color: var(--text-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .text-gold { color: var(--accent-gold); }
        .btn-gold {
            background: linear-gradient(180deg, var(--accent-ember), var(--accent-gold));
            color: #0A1F1A;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }
        .btn-gold:hover { background: linear-gradient(180deg, var(--accent-gold), var(--accent-shadow)); color: #fff; }
        .navbar { background-color: #0A1F1A; border-bottom: 2px solid var(--accent-gold); }
        .navbar-brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 1.5rem;
            letter-spacing: 1px;
            color: var(--accent-gold) !important;
        }
        .brand-logo {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(242, 209, 107, 0.65);
            box-shadow: 0 0 0 2px rgba(10, 31, 26, 0.85);
        }
        
        .success-card {
            background-color: var(--bg-card);
            border: 1px solid var(--line);
            border-top: 4px solid var(--accent-gold);
            border-radius: 8px;
            padding: 50px 30px;
            margin-top: 10vh;
        }
        .check-icon { font-size: 6rem; color: var(--accent-gold); margin-bottom: 20px; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{% static 'logo.jpg' %}" alt="{{ company_name }} logo" class="brand-logo"> {{ company_name }}
            </a>
        </div>
    </nav>

    <!-- Success Message -->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6 text-center">
                <div class="success-card shadow-lg">
                    <i class="fa-solid fa-circle-check check-icon"></i>
                    <h2 class="text-white fw-bold mb-3">{{ message }}</h2>
                    <p class="text-muted mb-4">{{ message_desc }}</p>
                    <a href="/" class="btn btn-gold px-4 py-2"><i class="fa-solid fa-house me-2"></i> Return to Homepage</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
